<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Color Studio</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #1e293b, #020617);
  font-family: "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* CARD PRINCIPAL */
.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 25px;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
  width: 320px;
  text-align: center;
}

/* TÍTULO */
h1 {
  margin-bottom: 20px;
  font-size: 22px;
  opacity: 0.9;
}

/* ÁREA DE CORES */
.palette {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

/* BOLINHAS DE COR */
.color {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.color:hover {
  transform: scale(1.2);
  box-shadow: 0 0 15px white;
}

/* PICKER BONITO */
.picker {
  width: 100%;
  height: 50px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  margin-bottom: 15px;
}

/* PREVIEW */
.preview {
  width: 100%;
  height: 70px;
  border-radius: 15px;
  margin-top: 10px;
  border: 2px solid rgba(255,255,255,0.2);
  transition: 0.3s;
}

/* HEX */
.hex {
  margin-top: 15px;
  font-size: 20px;
  letter-spacing: 2px;
}

/* BOTÃO */
button {
  margin-top: 12px;
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #38bdf8, #818cf8);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.2);
}
</style>
</head>

<body>

<div class="container">
  <h1>🎨 Color Studio</h1>

  <!-- PALETA BONITA -->
  <div class="palette" id="palette"></div>

  <!-- PICKER MODERNO -->
  <input type="color" class="picker" id="picker">

  <div class="preview" id="preview"></div>
  <div class="hex" id="hex">#ffffff</div>

  <button onclick="copiar()">Copiar HEX</button>
</div>

<script>
const palette = document.getElementById("palette");
const preview = document.getElementById("preview");
const hex = document.getElementById("hex");
const picker = document.getElementById("picker");

// CORES BONITAS (CURADAS)
const colors = [
  "#ff0000","#ff7f00","#ffff00","#00ff00","#00ffff","#0000ff",
  "#8b00ff","#ff1493","#ff4500","#ffd700","#00fa9a","#1e90ff",
  "#ff69b4","#ff6347","#7fff00","#40e0d0","#4169e1","#9932cc",
  "#ffffff","#cccccc","#888888","#444444","#222222","#000000"
];

// CRIAR BOLINHAS
colors.forEach(c => {
  const div = document.createElement("div");
  div.className = "color";
  div.style.background = c;

  div.onclick = () => setColor(c);

  palette.appendChild(div);
});

// SETAR COR
function setColor(c) {
  preview.style.background = c;
  hex.textContent = c;
  picker.value = c;
}

// PICKER
picker.addEventListener("input", () => {
  setColor(picker.value);
});

// COPIAR
function copiar() {
  navigator.clipboard.writeText(hex.textContent);
}

// INIT
setColor("#ffffff");
</script>

</body>
</html>
