<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

<body>
<div class="top-bar">
    <div class="home-button">
        <a href="index.html">
            <img src="Imagens/casa.png" alt="Home" class="casa">
        </a>
    </div>
</div>
<div class="espaco" id="form">
    <h1 id='titulo'>Cadastro Simples.</h1>
    <form method="get">
        <label for="nome">
            <h2>Nome de Usuário:</h2>
        </label>
        <input type="text" id="nome" name="nome"><br>
        
        <label for="senha">
            <h2>Senha:</h2>
        </label>
        <input type="password" id="senha" name="senha"><br>
        <button type="submit"><h2>Enviar dados</h2></button>
    </form>    
<button onclick ="alterarFundo()">Clique aqui para trocar a cor do site.</button>
<button onclick ="voltarFundo()">Clique aqui para voltar a cor original do site.</button>
</div>
