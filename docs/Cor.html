<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Color Studio</title>

<style>
.top-bar {
  position: absolute;
  display: flex;
  top: 0;
  left: 0;
  width: 100%;
  justify-content: flex-start;
  align-items: center;
  padding: 10px;
  margin: 10px;
}
.home-button {
  display: inline-block;
  transition: 0.3s;
  padding: 15px;
  border-radius: 10px;
  margin-left: 37px;
}
.home-button img {
  width: 60px;
  height: 60px;
  object-fit:cover;
}
.home-button:hover {
  background-color: #2f4a80;
  transform: scale(1.04);
}
.casa {
  border: 3px solid white;
  display: block;
  border-radius: 10px;
}
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #1e293b, #020617);
  font-family: "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}
.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 25px;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
  width: 320px;
  text-align: center;
}
h1 {
  margin-bottom: 20px;
  font-size: 22px;
  opacity: 0.9;
}
.palette {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.color {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.color:hover {
  transform: scale(1.2);
  box-shadow: 0 0 15px white;
}
.picker {
  width: 100%;
  height: 50px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  margin-bottom: 15px;
}
.preview {
  width: 100%;
  height: 70px;
  border-radius: 15px;
  margin-top: 10px;
  border: 2px solid rgba(255,255,255,0.2);
  transition: 0.3s;
}
.hex {
  margin-top: 15px;
  font-size: 20px;
  letter-spacing: 2px;
}
button {
  margin-top: 12px;
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #38bdf8, #818cf8);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}
button:hover {
  transform: scale(1.05);
  filter: brightness(1.2);
}
</style>
</head>
<body>
<div class="top-bar">
    <div class="home-button">
        <a href="index.html">
            <img src="Imagens/casa.png" alt="Home" class="casa">
        </a>
    </div>
</div>
<div class="container">
  <h1>🎨 Color Studio</h1>
  <div class="palette" id="palette"></div>
  <input type="color" class="picker" id="picker">
  <div class="preview" id="preview"></div>
  <div class="hex" id="hex">#ffffff</div>
  <button onclick="copiar()">Copiar HEX</button>
</div>

<script>
const palette = document.getElementById("palette");
const preview = document.getElementById("preview");
const hex = document.getElementById("hex");
const picker = document.getElementById("picker");

const colors = [
  "#ff0000","#ff7f00","#ffff00","#00ff00","#00ffff","#0000ff",
  "#8b00ff","#ff1493","#ff4500","#ffd700","#00fa9a","#1e90ff",
  "#ff69b4","#ff6347","#7fff00","#40e0d0","#4169e1","#9932cc",
  "#ffffff","#cccccc","#888888","#444444","#222222","#000000"
];

colors.forEach(c => {
  const div = document.createElement("div");
  div.className = "color";
  div.style.background = c;

  div.onclick = () => setColor(c);

  palette.appendChild(div);
});

function setColor(c) {
  preview.style.background = c;
  hex.textContent = c;
  picker.value = c;
}

picker.addEventListener("input", () => {
  setColor(picker.value);
});

function copiar() {
  navigator.clipboard.writeText(hex.textContent);
}

setColor("#ffffff");
</script>
</body>
</html>
